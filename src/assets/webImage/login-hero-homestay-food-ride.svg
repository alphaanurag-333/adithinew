<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Atithi professional hero visual</title>
  <desc id="desc">Professional clean login hero for homestays, food, and rides.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="24" x2="500" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF5FF"/>
      <stop offset="0.6" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EBFBF7"/>
    </linearGradient>
    <linearGradient id="primary" x1="116" y1="74" x2="374" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173B5F"/>
      <stop offset="1" stop-color="#20B8B5"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173B5F" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="520" height="360" rx="22" fill="url(#bg)"/>
  <circle cx="70" cy="58" r="82" fill="#DCEEFF" opacity="0.8"/>
  <circle cx="454" cy="62" r="88" fill="#DDF9F4" opacity="0.8"/>
  <path d="M0 290C80 245 156 243 231 272C302 299 386 309 520 265V360H0V290Z" fill="#D8F1ED" opacity="0.9"/>

  <g filter="url(#cardShadow)">
    <rect x="92" y="58" width="336" height="230" rx="26" fill="#FFFFFF"/>
    <rect x="92.7" y="58.7" width="334.6" height="228.6" rx="25.3" stroke="#DCE7F2"/>
  </g>

  <!-- left pane: stay -->
  <rect x="114" y="88" width="92" height="170" rx="16" fill="#F1F7FF"/>
  <path d="M160 116L192 138V140H128V138L160 116Z" fill="url(#primary)"/>
  <rect x="130" y="140" width="60" height="52" rx="8" fill="#E4F0FF" stroke="#173B5F" stroke-width="1.6"/>
  <rect x="153" y="162" width="14" height="30" rx="3" fill="#173B5F"/>
  <rect x="138" y="156" width="10" height="9" rx="2" fill="#FFFFFF"/>
  <rect x="172" y="156" width="10" height="9" rx="2" fill="#FFFFFF"/>
  <circle cx="160" cy="131" r="4.5" fill="#FFC069"/>

  <!-- middle pane: food -->
  <rect x="214" y="88" width="92" height="170" rx="16" fill="#F7FBFF"/>
  <ellipse cx="260" cy="190" rx="30" ry="8" fill="#173B5F" opacity="0.1"/>
  <path d="M234 176H286C284 187 276 194 260 194C244 194 236 187 234 176Z" fill="url(#primary)" opacity="0.32"/>
  <ellipse cx="260" cy="174" rx="24" ry="7.2" fill="#FFF4DE" stroke="#173B5F" stroke-width="1.4"/>
  <path d="M251 156C248 148 250 141 254 136" stroke="#20B8B5" stroke-width="2" stroke-linecap="round"/>
  <path d="M260 154C257 146 259 139 263 134" stroke="#20B8B5" stroke-width="2" stroke-linecap="round"/>
  <path d="M269 156C266 148 268 141 272 136" stroke="#20B8B5" stroke-width="2" stroke-linecap="round"/>
  <circle cx="252" cy="173" r="3.2" fill="#22C55E"/>
  <circle cx="260" cy="170" r="3" fill="#EF4444"/>
  <circle cx="268" cy="173" r="3.2" fill="#F59E0B"/>

  <!-- right pane: ride -->
  <rect x="314" y="88" width="92" height="170" rx="16" fill="#F1FAFA"/>
  <path d="M329 186H391C395 186 399 182 399 178V170C399 162 393 156 385 156H335C327 156 321 162 321 170V178C321 182 325 186 329 186Z" fill="#ECF8FF" stroke="#173B5F" stroke-width="1.6"/>
  <rect x="336" y="162" width="32" height="12" rx="3" fill="#FFFFFF" stroke="#20B8B5" stroke-width="1.1"/>
  <circle cx="337" cy="186" r="7.5" fill="#1E293B"/>
  <circle cx="382" cy="186" r="7.5" fill="#1E293B"/>
  <circle cx="337" cy="186" r="3.2" fill="#94A3B8"/>
  <circle cx="382" cy="186" r="3.2" fill="#94A3B8"/>
  <path d="M323 147C341 137 365 137 387 145" stroke="url(#primary)" stroke-width="2.6" stroke-linecap="round"/>

  <!-- footer strip in card -->
  <rect x="148" y="226" width="224" height="34" rx="17" fill="#F4FAFF" stroke="#D8E9F6"/>
  <circle cx="165" cy="243" r="5" fill="#173B5F"/>
  <circle cx="181" cy="243" r="5" fill="#20B8B5"/>
  <text x="267" y="247" text-anchor="middle" fill="#5F6F81" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700">Homestay - Food - Rides</text>
